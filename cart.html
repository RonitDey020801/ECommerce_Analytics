<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — ShopDemo</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="header">
  <div class="container header-inner">
    <a href="shop.html" class="logo">Shop<span>Demo</span></a>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search products…">
      <button id="search-btn">Search</button>
    </div>
    <nav class="nav-links">
      <a href="shop.html">Home</a>
      <a href="index.html">Sign In</a>
      <a href="cart.html" class="cart-link">
        🛒 Cart <span class="cart-badge cart-count" style="display:none">0</span>
      </a>
    </nav>
  </div>
</header>

<main class="container page-wrap">
  <h1 class="page-title">Shopping Cart</h1>
  <div id="cart-mount"></div>
</main>

<div id="analytics-panel"></div>

<script src="js/data.js"></script>
<script src="js/analytics.js"></script>
<script src="js/cart.js"></script>
<script src="js/main.js"></script>
<script>
  function render() {
    const items    = Cart.getItems();
    const subtotal = Cart.getSubtotal();
    const shipping = subtotal > 0 && subtotal < 50 ? 5.99 : 0;
    const tax      = subtotal * 0.08;
    const total    = subtotal + shipping + tax;
    const mount    = document.getElementById('cart-mount');

    if (items.length === 0) {
      mount.innerHTML = `
        <div class="empty-cart">
          <div class="empty-icon">🛒</div>
          <h3>Your cart is empty</h3>
          <p>Looks like you haven't added anything yet.</p>
          <a href="shop.html" class="btn btn-primary">Continue Shopping</a>
        </div>`;
      return;
    }

    mount.innerHTML = `
      <div class="cart-layout">

        <!-- Items -->
        <div>
          <div class="cart-items">
            ${items.map(item => `
              <div class="cart-item" id="row-${item.id}">
                <div class="cart-thumb">${item.emoji || '📦'}</div>
                <div class="cart-item-info">
                  <div class="cart-item-name">
                    <a href="product.html?id=${item.id}">${item.name}</a>
                  </div>
                  <div class="cart-item-cat">${item.category}</div>
                  <div class="cart-item-unit">${fmt(item.price)} each</div>
                </div>
                <div class="cart-item-right">
                  <div class="qty-ctrl">
                    <button onclick="changeQty(${item.id}, ${item.quantity - 1})">−</button>
                    <input type="number" value="${item.quantity}" min="1" max="99"
                      onchange="changeQty(${item.id}, parseInt(this.value) || 1)">
                    <button onclick="changeQty(${item.id}, ${item.quantity + 1})">+</button>
                  </div>
                  <div class="cart-item-total">${fmt(item.price * item.quantity)}</div>
                  <button class="btn btn-danger btn-sm" onclick="removeItem(${item.id})">Remove</button>
                </div>
              </div>
            `).join('')}
          </div>
          <div style="margin-top:1.1rem;display:flex;gap:0.75rem">
            <a href="shop.html" class="btn btn-ghost">← Continue Shopping</a>
            <button class="btn btn-ghost btn-sm" onclick="clearCart()">Clear Cart</button>
          </div>
        </div>

        <!-- Summary -->
        <div>
          <div class="summary-card">
            <h3>Order Summary</h3>

            <div class="coupon-row">
              <input type="text" id="coupon-input" placeholder="Coupon code">
              <button class="btn btn-ghost btn-sm" onclick="applyCoupon()">Apply</button>
            </div>

            <div class="summary-row">
              <span>Subtotal (${items.reduce((s,i) => s + i.quantity, 0)} items)</span>
              <span>${fmt(subtotal)}</span>
            </div>
            <div class="summary-row">
              <span>Shipping</span>
              <span>${shipping === 0 ? '<span class="text-success">Free</span>' : fmt(shipping)}</span>
            </div>
            <div class="summary-row">
              <span>Tax (8%)</span>
              <span>${fmt(tax)}</span>
            </div>
            <div class="summary-row total">
              <span>Total</span>
              <span>${fmt(total)}</span>
            </div>

            ${subtotal > 0 && subtotal < 50 ? `
              <div class="free-ship-note">Add ${fmt(50 - subtotal)} more for free shipping!</div>
            ` : subtotal >= 50 ? `
              <div class="free-ship-note">✓ You qualify for free shipping!</div>
            ` : ''}

            <button class="btn btn-primary btn-full btn-lg" style="margin-top:0.75rem"
              onclick="startCheckout()">
              Proceed to Checkout →
            </button>
          </div>
        </div>

      </div>`;

    syncCart();
  }

  function changeQty(id, newQty) {
    const item = Cart.getItems().find(i => i.id === id);
    if (item && newQty >= 1) {
      const action = newQty > item.quantity ? 'Increased' : 'Decreased';
      Analytics.track('Quantity Changed', { product_name: item.name, action, quantity: newQty });
    }
    Cart.updateQty(id, newQty);
    render();
  }

  function removeItem(id) {
    const item = Cart.getItems().find(i => i.id === id);
    if (item) Analytics.track('Removed from Cart', { product_name: item.name, action: 'Removed', quantity: 0 });
    Cart.removeItem(id);
    render();
  }

  function clearCart() {
    if (!confirm('Remove all items from your cart?')) return;
    Cart.clear();
    render();
  }

  function applyCoupon() {
    const code = (document.getElementById('coupon-input').value || '').trim().toUpperCase();
    if (!code) return;
    showToast(`Coupon "${code}" is not valid (demo store)`);
  }

  function startCheckout() {
    window.location.href = 'checkout.html';
  }

  document.addEventListener('DOMContentLoaded', () => {
    render();
    Analytics.track('Page View', {});
  });

  // Search redirect
  document.getElementById('search-btn').addEventListener('click', () => {
    const q = document.getElementById('search-input').value.trim();
    if (q) window.location.href = `shop.html?q=${encodeURIComponent(q)}`;
  });
  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('search-btn').click();
  });
</script>

</body>
</html>
