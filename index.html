<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopDemo — Sign In</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    html, body {
      height: 100%;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 55%, #2563eb 100%);
    }

    .login-outer {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .lc {
      background: #fff;
      border-radius: 20px;
      padding: 2.75rem 2.5rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 30px 60px -12px rgba(0,0,0,0.45);
    }

    /* Brand */
    .lc-brand {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1.75rem;
      border-bottom: 1px solid var(--border);
    }

    .lc-brand-name {
      font-size: 2.1rem;
      font-weight: 900;
      color: var(--primary);
      letter-spacing: -1px;
      line-height: 1;
    }

    .lc-brand-name span { color: var(--text); }

    .lc-brand-tag {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.13em;
      margin-top: 0.4rem;
    }

    /* Heading */
    .lc-heading {
      font-size: 1.5rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 0.3rem;
    }

    .lc-sub {
      font-size: 0.875rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 1.75rem;
    }

    /* Social */
    .lc-social {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
      margin-bottom: 1.25rem;
    }

    .lc-social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.7rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: #fff;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s, transform 0.1s;
      font-family: inherit;
    }

    .lc-social-btn:hover {
      border-color: #94a3b8;
      background: #f8fafc;
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }

    /* Divider */
    .lc-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      margin: 0 0 1.25rem;
    }

    .lc-divider::before,
    .lc-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Form */
    .lc-form { display: flex; flex-direction: column; gap: 1rem; }

    .lc-field { display: flex; flex-direction: column; gap: 0.3rem; }

    .lc-field label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    .lc-field input {
      padding: 0.7rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      background: #fff;
      color: var(--text);
      width: 100%;
      font-family: inherit;
    }

    .lc-field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }

    .lc-field input.field-error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(220,38,38,0.1);
    }

    .lc-pw-wrap { position: relative; }
    .lc-pw-wrap input { padding-right: 2.85rem; }

    .lc-toggle-pw {
      position: absolute;
      right: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.9rem;
      padding: 0;
      line-height: 1;
      transition: color 0.15s;
    }

    .lc-toggle-pw:hover { color: var(--text); }

    /* Options row */
    .lc-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.83rem;
    }

    .lc-remember {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      user-select: none;
    }

    .lc-remember input { accent-color: var(--primary); cursor: pointer; }

    .lc-forgot {
      color: var(--primary);
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .lc-forgot:hover { opacity: 0.7; }

    /* Error */
    .lc-error {
      background: #fef2f2;
      color: var(--danger);
      border: 1px solid #fecaca;
      border-radius: var(--radius);
      padding: 0.65rem 0.9rem;
      font-size: 0.85rem;
      display: none;
    }

    .lc-error.show { display: block; }

    /* Demo hint */
    .lc-hint {
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);
      border: 1px solid #bbf7d0;
      border-radius: var(--radius);
      padding: 0.65rem 0.9rem;
      font-size: 0.82rem;
      color: #15803d;
    }

    /* Submit */
    .lc-submit {
      width: 100%;
      padding: 0.875rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      letter-spacing: 0.01em;
      font-family: inherit;
    }

    .lc-submit:hover {
      background: var(--primary-hover);
      box-shadow: 0 6px 16px rgba(37,99,235,0.35);
    }

    .lc-submit:active { transform: scale(0.99); }

    /* Footer */
    .lc-footer {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .lc-footer a { color: var(--primary); font-weight: 700; }
    .lc-footer a:hover { text-decoration: underline; }

    @media (max-width: 520px) {
      .lc { padding: 2rem 1.5rem; border-radius: 16px; }
    }
  </style>
</head>
<body>

<div class="login-outer">
  <div class="lc">

    <div class="lc-brand">
      <div class="lc-brand-name">Shop<span>Demo</span></div>
      <div class="lc-brand-tag">Analytics Testing Storefront</div>
    </div>

    <h1 class="lc-heading">Welcome back</h1>
    <p class="lc-sub">Sign in to your account to continue shopping.</p>

    <div class="lc-social">
      <button class="lc-social-btn" id="google-btn">
        <svg width="17" height="17" viewBox="0 0 48 48" fill="none">
          <path d="M43.6 20.5H42V20H24v8h11.3C33.7 32.5 29.3 35 24 35c-6.1 0-11-4.9-11-11s4.9-11 11-11c2.8 0 5.3 1 7.2 2.7l5.7-5.7C33.5 7.3 29 5 24 5 13 5 4 14 4 25s9 20 20 20c11 0 20-9 20-20 0-1.2-.1-2.4-.4-4.5z" fill="#FFC107"/>
          <path d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c2.8 0 5.3 1 7.2 2.7l5.7-5.7C33.5 7.3 29 5 24 5 16.3 5 9.7 9 6.3 14.7z" fill="#FF3D00"/>
          <path d="M24 45c4.9 0 9.3-1.8 12.7-4.8l-5.9-5c-1.7 1.2-3.9 1.8-6.8 1.8-5.3 0-9.7-3.5-11.3-8.3l-6.5 5C9.5 41 16.2 45 24 45z" fill="#4CAF50"/>
          <path d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.4l5.9 5c-.4.4 6.9-5 6.9-13.4 0-1.2-.1-2.4-.4-4.5z" fill="#1976D2"/>
        </svg>
        Google
      </button>
      <button class="lc-social-btn" id="github-btn">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.49.5.09.68-.22.68-.48 0-.24-.01-.87-.01-1.7-2.78.6-3.37-1.34-3.37-1.34-.45-1.15-1.11-1.46-1.11-1.46-.91-.62.07-.61.07-.61 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.08 2.91.83.09-.65.35-1.08.63-1.33-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02A9.56 9.56 0 0 1 12 6.8c.85 0 1.71.11 2.51.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.68-4.57 4.93.36.31.68.92.68 1.85 0 1.34-.01 2.41-.01 2.74 0 .27.18.58.69.48A10.01 10.01 0 0 0 22 12c0-5.52-4.48-10-10-10z"/>
        </svg>
        GitHub
      </button>
    </div>

    <div class="lc-divider">or continue with email</div>

    <form class="lc-form" id="login-form" novalidate>

      <div class="lc-field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email"
          placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="lc-field">
        <label for="password">Password</label>
        <div class="lc-pw-wrap">
          <input type="password" id="password" name="password"
            placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="lc-toggle-pw" id="toggle-pw" title="Show / hide">👁</button>
        </div>
      </div>

      <div class="lc-options">
        <label class="lc-remember">
          <input type="checkbox" id="remember-me">
          <span>Remember me</span>
        </label>
        <span class="lc-forgot" id="forgot-link">Forgot password?</span>
      </div>

      <div class="lc-error" id="login-error"></div>

      <div class="lc-hint">
        💡 Demo: use any email + password <strong>demo123</strong>
      </div>

      <button type="submit" class="lc-submit">Sign In</button>

    </form>

    <div class="lc-footer">
      Don't have an account?
      <a href="#" id="signup-link">Create one →</a>
    </div>

  </div>
</div>

<div id="analytics-panel"></div>

<script src="js/data.js"></script>
<script src="js/analytics.js"></script>
<script src="js/cart.js"></script>
<script src="js/main.js"></script>
<script>
  const redirectTo = getParam('redirect') || 'shop.html';

  // ── Password visibility toggle ─────────────────────────
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  });

  // ── Forgot password ────────────────────────────────────
  document.getElementById('forgot-link').addEventListener('click', () => {
    showToast('Password reset is not available in the demo.');
  });

  // ── Sign up link ───────────────────────────────────────
  document.getElementById('signup-link').addEventListener('click', e => {
    e.preventDefault();
    showToast('Registration is not available in the demo.');
  });

  // ── Social buttons ─────────────────────────────────────
  document.getElementById('google-btn').addEventListener('click', () => {
    showToast('Google login is not available in the demo.');
  });

  document.getElementById('github-btn').addEventListener('click', () => {
    showToast('GitHub login is not available in the demo.');
  });

  // ── Form submit ────────────────────────────────────────
  document.getElementById('login-form').addEventListener('submit', e => {
    e.preventDefault();

    const email   = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const remember = document.getElementById('remember-me').checked;
    const errorEl  = document.getElementById('login-error');
    const pwInput  = document.getElementById('password');

    if (!email || !password) {
      errorEl.textContent = 'Please enter your email and password.';
      errorEl.classList.add('show');
      return;
    }

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      errorEl.textContent = 'Please enter a valid email address.';
      errorEl.classList.add('show');
      return;
    }

    if (password !== 'demo123') {
      errorEl.textContent = 'Incorrect password. Hint: try "demo123"';
      errorEl.classList.add('show');
      pwInput.classList.add('field-error');
      return;
    }

    errorEl.classList.remove('show');
    pwInput.classList.remove('field-error');

    sessionStorage.setItem('shopdemo_user', JSON.stringify({ email, remember }));
    showToast('Signed in successfully! Redirecting…');
    setTimeout(() => { window.location.href = redirectTo; }, 1200);
  });
</script>

</body>
</html>
